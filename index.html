<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>


        .psy {
            background-image: 
            repeating-radial-gradient(circle at center, transparent 0, transparent 20px, rgba(255, 255, 255, 0.3) 25px, transparent 110px),
            radial-gradient(circle at center, rebeccapurple, purple);

        }

        .noise {
            background-image: 
                linear-gradient(to bottom right, rgba(102, 51, 153, 0.5), rgba(102, 51, 153, 0.5)),
                url("/img/noise.svg"),
                linear-gradient(to bottom right, rebeccapurple, rebeccapurple);
        }

    </style>

    <title>Are you psychic?</title>
</head>
<body class="h-dvh w-full">


    <div x-data="game" class="relative h-full w-full">

    
        <div class="absolute inset-0 mx-auto flex items-center justify-center psy">

            <div class="max-w-[500px]">
                <img x-ref="logo" src="/img/are_you_psychic.png" alt="" usemap="#logomap">
            </div>
            <map name="logomap">

                <area @click="resetGame(); open=true" class="" shape="circle" :coords="coords" href="#" alt="">

            </map>

            <div x-show="open" x-transition.duration.500ms x-trap="open" class="absolute rounded-lg flex flex-col inset-4 z-10 noise p-4 border-4 border-[gold]">

                <!-- <button class="text-[gold]" @click="open=false">close</button> -->

                <div x-show="!gameOver" class="flex justify-center gap-x-2 max-w-fit mx-auto  bg-[rebeccapurple]">

                    <div class="text-[gold] p-4 max-w-64 border border-2 border-[gold] text-xl">

                        <div class="text-xl">
                            Correct
                        </div>

                        <div class="text-4xl" x-text="correctGuesses">
                            
                        </div>
                    </div>

                    <div class="text-[gold] p-4 max-w-64 border border-2 border-[gold] text-xl">

                        <div class="text-xl">
                            Incorrect
                        </div>

                        <div class="text-4xl" x-text="incorrectGuesses">
                            
                        </div>
                    </div>

                
                </div>


                <div x-show="!gameOver" class="flex justify-center gap-x-4 mt-6">

                    <div class="w-64 relative">
                        
                        <div 
                            x-show="showCard"
                            :key="currentCard?.id"
                            x-transition:enter="transition ease-out duration-500"
                            x-transition:enter-start="translate-x-56 scale-95 opacity-0"
                            x-transition:enter-end="translate-x-0 rotate-[-12deg] opacity-100">
                            <template x-if="currentCard">
                                <img :src="currentCard.url" alt="">
                            </template>
                        </div>

                    </div>

                    <div class="w-64" x-show="deck.length > 0">
                        <img src="/img/card-back.png" alt="">
                    </div>

                </div>

                <div x-show="gameOver" x-transition class="bg-[rebeccapurple] text-[gold] border-4 border-[gold] my-auto mx-auto p-4 lg:p-8 text-center">

                    <h1 class="text-5xl">
                        Congratulations!
                    </h1>

                    <p class="mt-6 text-4xl">
                        You scored <span x-text="correctGuesses"></span> out of <span x-text="maxDeckSize"></span>!
                    </p>

                    <div class="mt-8">
                        <button class="border border-[gold] hover:text-[rebeccapurple] hover:bg-[gold] rounded focus:outline-0 focus:ring-2 text-lg px-3 py-2" 
                            @click="resetGame">
                            Play Again?
                        </button>
                    </div>

                    <div class="mt-8">
                        <button class="border border-[gold] hover:text-[rebeccapurple] hover:bg-[gold] rounded focus:outline-0 focus:ring-2 text-lg px-3 py-2" 
                            @click="open=false">
                            Close
                        </button>
                    </div>

                </div>

                <div x-show="!gameOver" class="w-full mt-auto">
                    <div class="flex justify-center gap-x-2 max-w-fit p-6 mx-auto bg-[rebeccapurple] border border-2 border-[gold]">
                        <template x-for="card in cards">
                            <button @click="makeGuess(card)" class="w-48 rounded-lg shadow-[rebeccapurple] hover:shadow-xl transition hover:-translate-y-8">
                                <img class="pointer-events-none" :src="card.url" alt="">    
                            </button>
                        </template>
                    </div>
                </div>

            </div>

        </div>

    </div>

    



    <script>
        document.addEventListener('alpine:init', () => {

            Alpine.data('game', () => ({

                label: 'Are you psychic?',
                logoImage: null,
                open: false,
                cards: [
                    {value: 1, name: 'circle', url: '/img/card-circle.png'},
                    {value: 2, name: 'cross', url: '/img/card-cross.png'},
                    {value: 3, name: 'square', url: '/img/card-square.png'},
                    {value: 4, name: 'star', url: '/img/card-star.png'},
                    {value: 5, name: 'waves', url: '/img/card-waves.png'},
                ],
                deck: [],
                maxDeckSize: 25,
                showCard: false,
                spentDeck: [],
                correctGuesses: 0,
                incorrectGuesses: 0,
                gameOver: false,
                currentCard: null,
                reset: true,

                init(){
                    this.logoImage = this.$refs.logo

                    this.initDeck()
                },

                get coords(){
                    let rect = this.logoImage.getBoundingClientRect()
                    let x = 0
                    let y = 0
                    let width = rect.width
                    let height = rect.height

                    return `${x + width/2}, ${y + height/2}, 125`
                },

                randomNumber(min, max) {
                    return Math.floor(Math.random() * (max - min + 1)) + min;
                },

                makeGuess(guessedCard){

                    if(this.gameOver){
                        return
                    }

                    this.showCard = false

                    let actualCard = this.deck.pop()

                    actualCard.value === guessedCard.value ? this.correctGuesses++ : this.incorrectGuesses++

                    this.$nextTick(() => {
                        this.currentCard = actualCard;
                        this.showCard = true; // Slide the 'new' card in
                    });

                    if(this.deck.length === 0){
                        this.gameOver = true
                    }

                },

                initDeck(){

                    this.deck = []

                    while(this.deck.length < this.maxDeckSize){
                        this.deck.push({...this.cards[this.randomNumber(0, 4)]})
                    }

                },

                resetGame(){
                    this.gameOver = false
                    this.correctGuesses = 0
                    this.incorrectGuesses = 0
                    this.currentCard = null
                    this.initDeck()
                }


            }))

        })
    </script>
    
</body>
</html>
